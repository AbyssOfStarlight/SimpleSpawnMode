name: Build Mod

on:
  push:
    branches: [ master, main ]

permissions:
  contents: write

jobs:
  buildJar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PATH
        run: |
          echo "${ANDROID_HOME}/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'adopt'

      - name: Build mod jar
        run: |
          chmod +x ./gradlew
          ./gradlew deploy

      # --- ОПРЕДЕЛЕНИЕ ВЕРСИИ ---
      - name: Extract version
        id: get_version
        run: |
          # Ищем версию в mod.json или mod.hjson (универсальный поиск)
          # Извлекает значение после "version":
          VERSION=$(grep -E '"version":|version:' mod.json mod.hjson 2>/dev/null | head -n 1 | sed -E 's/.*[:" ]+([0-9.]+).*/\1/')
          echo "MOD_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      # --- СОЗДАНИЕ/ОБНОВЛЕНИЕ РЕЛИЗА ---
      - name: Release or Update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.get_version.outputs.MOD_VERSION }}
          JAR_PATH: build/libs/${{ github.event.repository.name }}.jar
        run: |
          TAG="v$VERSION"
          
          # Проверяем, существует ли уже такой релиз
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Релиз $TAG уже есть. Перезаписываю файл..."
            gh release upload "$TAG" "$JAR_PATH" --clobber
          else
            echo "Создаю новый релиз $TAG..."
            gh release create "$TAG" "$JAR_PATH" \
              --title "Release $TAG" \
              --notes "Автоматическая сборка версии $VERSION"
          fi

      - name: Upload built jar file (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}
          path: build/libs/${{ github.event.repository.name }}.jar